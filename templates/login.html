<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peralta — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07101a;
      color: #c8d8e8;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #0d1e2e;
      border: 1px solid #1a3050;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo span {
      font-size: 15px;
      font-weight: 600;
      color: #e0eaf4;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #7a9ab8;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #07101a;
      border: 1px solid #1a3050;
      border-radius: 6px;
      padding: 10px 12px;
      color: #e0eaf4;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      margin-bottom: 18px;
      outline: none;
      transition: border-color .2s;
    }

    input:focus { border-color: #4da6ff; }

    button {
      width: 100%;
      background: #4da6ff;
      color: #07101a;
      border: none;
      border-radius: 6px;
      padding: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    button:hover { background: #6db8ff; }

    .error {
      background: #ff4d4d22;
      border: 1px solid #ff4d4d55;
      color: #ff4d4d;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
        <line x1="9" y1="9" x2="9"    y2="2"    stroke="#4da6ff" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="9" y1="9" x2="15.5" y2="13"   stroke="#4da6ff" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="9" y1="9" x2="2.5"  y2="13"   stroke="#4da6ff" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="9" cy="9" r="2" fill="#4da6ff"/>
        <circle cx="9" cy="9" r="1" fill="#07101a"/>
      </svg>
      <span>Peralta I &mdash; Rodamientos</span>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Usuario</label>
      <input type="text" name="username" autofocus autocomplete="username" />

      <label>Contraseña</label>
      <input type="password" name="password" autocomplete="current-password" />

      <button type="submit">Ingresar</button>
    </form>
  </div>
</body>
</html>
